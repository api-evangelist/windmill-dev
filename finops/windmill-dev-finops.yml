description: >-
  FinOps view of Windmill spend. Windmill's Community Edition is open source
  (AGPL) and free to self-host - in that model the cost is your own compute,
  storage, and network for running the Windmill server, its Postgres database,
  and the worker fleet, with no vendor invoice. Windmill Enterprise (Cloud or
  self-hosted) is billed on a combination of Compute Units - worker execution
  capacity, roughly 2 worker-GB-month per CU - and Seats, with developer seats
  full-price and operator (execute-only) seats at half. Native subworkers and
  agent workers are metered separately. Because billing is driven by provisioned
  worker capacity and active users rather than per-API-call, cost optimization
  centers on right-sizing worker memory and count, consolidating operator seats,
  and pruning idle workspaces and schedules.
notes: >-
  Enterprise per-unit rates (per CU, per seat) are not reconciled here; verify on
  the Windmill pricing page. For self-hosted Community deployments, the dominant
  costs are infrastructure (Windmill server + Postgres + workers) rather than a
  license fee.
sources:
