alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Windmill
serviceCategory: Developer Platform and Workflow Orchestration
billingModel:
  pricingCategory: Usage-Based and Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Windmill Enterprise
  ServiceCategory: Developer Platform and Workflow Orchestration
  ProviderName: Windmill
  PublisherName: Windmill
  InvoiceIssuerName: Windmill
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: compute_units
  description: Worker execution capacity, roughly 2 worker-GB-month per Compute Unit; a 2 GB standard worker is 2 CU.
  unit: worker_gb_month
  aggregation: sum
  dimensions:
  - account
  - worker_group
- name: native_subworkers
  description: Native subworkers (run in batches) billed separately from standard worker groups.
  unit: subworkers
  aggregation: sum
  dimensions:
  - account
  - worker_group
- name: agent_workers
  description: Agent workers for distributed/edge execution, billed separately.
  unit: workers
  aggregation: sum
  dimensions:
  - account
  - worker_group
- name: developer_seats
  description: Active users who can author and execute runnables, billed per seat.
  unit: seats
  aggregation: max
  dimensions:
  - account
- name: operator_seats
  description: Execute-only users, counted as half a developer seat.
  unit: seats
  aggregation: max
  dimensions:
  - account
- name: self_hosted_compute
  description: Infrastructure cost of running self-hosted Windmill (server + Postgres + workers); no Windmill invoice on Community Edition.
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track Compute Units and seats per workspace and worker group; on self-hosted, monitor server, Postgres, and worker infrastructure costs.
- name: Allocation
  description: Use worker group tags and per-workspace grouping so compute and seat spend maps to teams and workloads.
- name: Optimization
  description: Right-size worker memory (1/2/>2 GB) and count, use concurrency limits to avoid over-provisioning, convert author-only users to operator seats, prune idle schedules and workspaces, and self-host Community Edition when volume is high.
- name: Accountability
  description: Assign owners per workspace and worker group; review monthly Compute Unit and seat usage against Enterprise entitlements or self-hosted infrastructure budget.
