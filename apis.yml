aid: windmill-dev
url: https://raw.githubusercontent.com/api-evangelist/windmill-dev/refs/heads/main/apis.yml
name: Windmill
kind: company
description: Windmill is an open-source developer platform that turns scripts (Python,
  TypeScript, Go, Bash, SQL, and more) into internal tools, UIs, workflows, and cron
  jobs. It runs as Windmill Cloud (app.windmill.dev) or self-hosted, with a distributed
  worker fleet executing jobs. Everything in a workspace - scripts, flows, apps,
  schedules, variables, resources, triggers - is addressable over a single REST API
  (base https://app.windmill.dev/api on Cloud, or /api self-hosted), authenticated
  with a Bearer token, and is the same surface the Windmill CLI and web UI use.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Developer Platform
- Workflows
- Internal Tools
- Job Orchestration
- Cron
- Open Source
created: '2026-07-02'
modified: '2026-07-02'
specificationVersion: '0.19'
